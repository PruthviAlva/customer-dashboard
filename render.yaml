services:
  - type: web
    name: customer-dashboard-backend
    runtime: node
    runtimeVersion: 18
    plan: free
    root_dir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 5000
      - key: NODE_ENV
        value: production
      - key: CORS_ORIGIN
        value: https://customer-dashboard-navy-tau.vercel.app
